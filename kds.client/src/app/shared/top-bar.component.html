<header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between gap-4">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded-lg bg-amber-500 flex items-center justify-center">
      <span class="text-slate-950 font-black text-sm">K</span>
    </div>
    <h1 class="text-slate-50 font-semibold tracking-tight whitespace-nowrap">{{ title }}</h1>
  </div>

  @if (auth.hasRole('Admin')) {
    <nav class="flex items-center gap-1 overflow-x-auto">
      <a
        routerLink="/admin"
        routerLinkActive="bg-slate-800 text-amber-400"
        class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors whitespace-nowrap"
      >
        Admin
      </a>
      <a
        routerLink="/cashier"
        routerLinkActive="bg-slate-800 text-amber-400"
        class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors whitespace-nowrap"
      >
        Cashier
      </a>
      <a
        routerLink="/kitchen"
        routerLinkActive="bg-slate-800 text-amber-400"
        class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors whitespace-nowrap"
      >
        Kitchen
      </a>
      <a
        routerLink="/order-history"
        routerLinkActive="bg-slate-800 text-amber-400"
        class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors whitespace-nowrap"
      >
        History
      </a>
    </nav>
  } @else if (auth.hasRole('Cashier')) {
    <nav class="flex items-center gap-1">
      <a
        routerLink="/kitchen"
        routerLinkActive="bg-slate-800 text-amber-400"
        class="px-3 py-1.5 rounded-lg text-sm font-medium text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors whitespace-nowrap"
      >
        Kitchen
      </a>
    </nav>
  }

  <div class="flex items-center gap-4 ml-auto">
    @if (auth.currentUser(); as user) {
      <div class="text-right hidden sm:block">
        <div class="text-slate-200 text-sm font-medium">{{ user.fullName }}</div>
        <div class="text-slate-500 text-xs">{{ user.roles.join(', ') }}</div>
      </div>
    }
    <button
      (click)="auth.logout()"
      class="text-slate-400 hover:text-slate-100 text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-slate-800 transition-colors"
    >
      Sign out
    </button>
  </div>
</header>
