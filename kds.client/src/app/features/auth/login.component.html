<div class="min-h-screen bg-slate-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-amber-500 mb-4">
        <span class="text-slate-950 font-black text-xl">K</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-50 tracking-tight">Kitchen Display System</h1>
      <p class="text-slate-500 text-sm mt-1">Sign in to continue</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4">
      @if (error()) {
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-3 py-2">
          {{ error() }}
        </div>
      }

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          autocomplete="username"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
          placeholder="you@restaurant.com"
        />
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-50 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-amber-500 hover:bg-amber-400 disabled:opacity-50 disabled:cursor-not-allowed text-slate-950 font-semibold rounded-lg py-2.5 transition-colors"
      >
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
